# scripts/fluentbit-values.yaml
# Fluent Bit configuration for local Kind environment only.
# Collects application pod logs and ships them to Elasticsearch.

config:
  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Exclude_Path      /var/log/containers/*_monitoring_*,/var/log/containers/*_kube-system_*,/var/log/containers/*_elastic-system_*,/var/log/containers/*_cert-manager_*,/var/log/containers/*_local-path-storage_*
        multiline.parser  docker, cri
        Tag               kube.*
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On

  filters: |
    [FILTER]
        Name              kubernetes
        Match             kube.*
        Merge_Log         Off
        Keep_Log          On
        K8S-Logging.Parser Off
        K8S-Logging.Exclude Off


  outputs: |
    [OUTPUT]
        Name              es
        Match             kube.*
        Host              ${ES_HOST}
        Port              9200
        HTTP_User         elastic
        HTTP_Passwd       ${ES_PASSWORD}
        Index             ${ES_LOG_INDEX}
        Suppress_Type_Name On
        tls               On
        tls.verify        Off
        Logstash_Format   Off

  service: |
    [SERVICE]
        Daemon       Off
        Flush        1
        Log_Level    info
        Parsers_File /fluent-bit/etc/parsers.conf
        Parsers_File /fluent-bit/etc/conf/custom_parsers.conf
        HTTP_Server  On
        HTTP_Listen  0.0.0.0
        HTTP_Port    2020
        Health_Check On

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi
