repos:
  - repo: https://github.com/psf/black
    rev: '23.9.1'
    hooks:
      - id: black
        language_version: python3
        args:
          - --line-length=100
        files: ^(src/|tests/).*\.py$

  - repo: https://github.com/pycqa/flake8
    rev: '6.1.0'
    hooks:
      - id: flake8
        args:
          - --max-line-length=100
          - "--ignore=E203,W503"
        files: ^(src/|tests/).*\.py$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: check-secrets
        name: Check for secrets
        entry: bash -c 'if git diff --cached | grep -E "(password|token|secret|key)\s*=\s*['\''\"]\w+" | grep -v "changeme\|example\|fake\|YOUR_"; then echo "❌ Potential secrets détectés!"; exit 1; fi'
        language: system
        pass_filenames: false
