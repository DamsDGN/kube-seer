repos:
  - repo: https://github.com/psf/black
    rev: '23.9.1'
    hooks:
      - id: black
        language_version: python3
        files: ^(src/|tests/).*\.py$

  - repo: https://github.com/pycqa/flake8
    rev: '6.1.0'
    hooks:
      - id: flake8
        files: ^(src/|tests/).*\.py$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: check-yaml
        exclude: ^(helm/|k8s/)
        args: [--allow-multiple-documents]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: check-secrets
        name: Check for secrets
        entry: bash -c 'if git diff --cached --name-only | grep -v "\.gitignore\|\.pre-commit-config\|Makefile\|SECURITY\.md" | grep -v "^docs/\|^helm/\|^scripts/" | xargs grep -lE "(password|api_key|secret_key|private_key|access_token)\s*=\s*[\"'\''][^\"'\'']{4,}" 2>/dev/null | grep -v "example\|changeme\|fake\|test_\|_test\|getenv\|environ"; then echo "❌ Secrets détectés!"; exit 1; fi'
        language: system
        pass_filenames: false
