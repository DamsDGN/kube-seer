name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        run: |
          if ! echo "${{ github.event.inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format. Expected X.Y.Z (e.g. 0.2.0)"
            exit 1
          fi

      - name: Bump versions
        run: |
          VERSION=${{ github.event.inputs.version }}
          sed -i "s/^version:.*/version: ${VERSION}/" helm/kube-seer/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" helm/kube-seer/Chart.yaml
          sed -i "s/^  tag:.*/  tag: \"${VERSION}\"/" helm/kube-seer/values.yaml

      - name: Commit and tag
        run: |
          VERSION=${{ github.event.inputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/kube-seer/Chart.yaml helm/kube-seer/values.yaml
          if git diff --cached --quiet; then
            echo "No version changes to commit, creating tag only"
          else
            git commit -m "chore: bump version to ${VERSION}"
            git push origin main
          fi
          git tag v${VERSION}
          git push origin v${VERSION}
