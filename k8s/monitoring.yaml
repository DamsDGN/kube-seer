apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  ports:
  - port: 9090
    name: web
  selector:
    app: prometheus
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kube-seer
  namespace: monitoring
  labels:
    app: kube-seer
spec:
  selector:
    matchLabels:
      app: kube-seer
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kube-seer-alerts
  namespace: monitoring
  labels:
    app: kube-seer
spec:
  groups:
  - name: kube-seer
    rules:
    - alert: SREAgentDown
      expr: up{job="kube-seer"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "EFK SRE Agent is down"
        description: "EFK SRE Agent has been down for more than 1 minute."

    - alert: SREAgentHighMemoryUsage
      expr: container_memory_usage_bytes{pod=~"kube-seer.*"} / container_spec_memory_limit_bytes > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "EFK SRE Agent high memory usage"
        description: "EFK SRE Agent memory usage is above 80% for more than 5 minutes."

    - alert: SREAgentHighCPUUsage
      expr: rate(container_cpu_usage_seconds_total{pod=~"kube-seer.*"}[5m]) > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "EFK SRE Agent high CPU usage"
        description: "EFK SRE Agent CPU usage is above 80% for more than 5 minutes."

    - alert: SREAgentTooManyAlerts
      expr: increase(sre_agent_alerts_total[1h]) > 100
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Too many alerts from SRE Agent"
        description: "SRE Agent has generated more than 100 alerts in the last hour."
