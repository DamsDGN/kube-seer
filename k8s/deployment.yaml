apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-seer-config
  namespace: monitoring
data:
  ELASTICSEARCH_URL: "http://elasticsearch.elastic-system.svc.cluster.local:9200"
  METRICS_INDEX: "metricbeat-*"
  LOGS_INDEX: "fluentd-*"
  ANALYSIS_INTERVAL: "300"
  CPU_THRESHOLD_WARNING: "70.0"
  CPU_THRESHOLD_CRITICAL: "85.0"
  MEMORY_THRESHOLD_WARNING: "70.0"
  MEMORY_THRESHOLD_CRITICAL: "85.0"
  LOG_LEVEL: "INFO"
  K8S_IN_CLUSTER: "true"
  MODEL_RETRAIN_INTERVAL: "3600"
  ANOMALY_THRESHOLD: "0.05"
---
apiVersion: v1
kind: Secret
metadata:
  name: kube-seer-secrets
  namespace: monitoring
type: Opaque
data:
  # Encoder en base64: echo -n 'your-password' | base64
  ELASTICSEARCH_PASSWORD: ""  # À remplir
  WEBHOOK_URL: ""  # À remplir si utilisé
  SLACK_WEBHOOK: ""  # À remplir si utilisé
  EMAIL_USERNAME: ""  # À remplir si utilisé
  EMAIL_PASSWORD: ""  # À remplir si utilisé
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-seer
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-seer
rules:
- apiGroups: [""]
  resources: ["pods", "nodes", "namespaces"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods", "nodes"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-seer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-seer
subjects:
- kind: ServiceAccount
  name: kube-seer
  namespace: monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-seer
  namespace: monitoring
  labels:
    app: kube-seer
    version: v1.0.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-seer
  template:
    metadata:
      labels:
        app: kube-seer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: kube-seer
      containers:
      - name: kube-seer
        image: kube-seer:latest
        imagePullPolicy: Never  # Important pour Kind - ne pas tirer depuis un registry
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: ELASTICSEARCH_USER
          value: "elastic"
        envFrom:
        - configMapRef:
            name: kube-seer-config
        - secretRef:
            name: kube-seer-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: models-storage
          mountPath: /tmp/models
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: models-storage
        emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: kube-seer
  namespace: monitoring
  labels:
    app: kube-seer
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: kube-seer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kube-seer
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - sre-agent.local
    secretName: kube-seer-tls
  rules:
  - host: sre-agent.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kube-seer
            port:
              number: 8080
