apiVersion: v1
kind: Secret
metadata:
  name: {{ include "efk-sre-agent.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "efk-sre-agent.labels" . | nindent 4 }}
type: Opaque
data:
  # Placeholder - doit être configuré après installation
  ELASTICSEARCH_PASSWORD: {{ "changeme" | b64enc | quote }}
  {{- if .Values.llm.enabled }}
  LLM_API_KEY: {{ .Values.llm.apiKey | default "changeme" | b64enc | quote }}
  {{- end }}
  {{- if .Values.alerting.slack.enabled }}
  SLACK_WEBHOOK: {{ .Values.alerting.slack.webhook | b64enc | quote }}
  {{- end }}
  {{- if .Values.alerting.email.enabled }}
  EMAIL_PASSWORD: {{ "changeme" | b64enc | quote }}
  {{- end }}