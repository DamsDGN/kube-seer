# Exemple pour environnement de production
# Usage: helm install prod-sre-agent ./helm/efk-sre-agent/ -f examples/values-prod.yaml

replicaCount: 2

config:
  elasticsearch:
    url: "https://elasticsearch.prod.example.com:9200"
    user: "sre-agent"
    passwordSecret: "elasticsearch-prod-credentials"
  
  analysis:
    interval: 300  # 5 minutes
    anomalyThreshold: 0.03  # Plus strict
  
  thresholds:
    cpu:
      warning: 60.0
      critical: 80.0
    memory:
      warning: 60.0
      critical: 80.0
  
  logLevel: "INFO"

# Resources de production
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

# Persistence activée avec stockage rapide
persistence:
  enabled: true
  size: 10Gi
  storageClass: "fast-ssd"

# Alerting complet
alerting:
  enabled: true
  slack:
    enabled: true
    webhook: "https://hooks.slack.com/services/PROD/SLACK/WEBHOOK"
  email:
    enabled: true
    smtpServer: "smtp.company.com"
    smtpPort: 587
    username: "sre-agent@company.com"
    recipients: "sre-team@company.com,ops@company.com"

# Ingress avec TLS
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: sre-agent.company.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sre-agent-tls
      hosts:
        - sre-agent.company.com

# Monitoring complet
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
  prometheusRule:
    enabled: true

# Autoscaling activé
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# Sécurité renforcée
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false  # Nécessaire pour les modèles ML

# Anti-affinity pour haute disponibilité
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - efk-sre-agent
        topologyKey: kubernetes.io/hostname

# Tolérations pour nodes dédiés monitoring
tolerations:
  - key: "monitoring"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"