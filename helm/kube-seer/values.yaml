# Agent
agent:
  analysisInterval: 300
  logLevel: INFO

# Elasticsearch (external prerequisite)
elasticsearch:
  url: ""
  username: ""
  password: ""
  secretRef: ""
  indices:
    metrics: "sre-metrics"
    logs: "sre-logs"
    anomalies: "sre-anomalies"

# Collectors
collectors:
  prometheus:
    enabled: true
    url: "http://prometheus-server:9090"
  metricsServer:
    enabled: true
  kubernetesApi:
    enabled: true
    watchEvents: true

# Detection thresholds
thresholds:
  cpu:
    warning: 70
    critical: 85
  memory:
    warning: 70
    critical: 85
  disk:
    warning: 80
    critical: 90

# ML
ml:
  retrainInterval: 3600
  windowSize: 100
  anomalyThreshold: 0.05

# Intelligence (optional LLM)
intelligence:
  enabled: false
  provider: ""
  apiUrl: ""
  apiKey: ""
  apiKeySecretRef: ""
  model: ""

# Alerting
alerter:
  alertmanager:
    enabled: true
    url: "http://alertmanager:9093"
  fallback:
    webhook:
      enabled: false
      url: ""

# Image
image:
  repository: damsdgn29/kube-seer
  tag: "2.0.0"
  pullPolicy: IfNotPresent

# Resources
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

# Service
service:
  type: ClusterIP
  port: 8080
  nodePort: ""

# ServiceMonitor
serviceMonitor:
  enabled: false
  interval: 30s

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Security
securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
