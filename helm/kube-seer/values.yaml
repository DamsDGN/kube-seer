# Agent
agent:
  analysisInterval: 300
  logLevel: INFO

# Exclusions — resources to skip during anomaly detection
# Supports plain name (any namespace) or "namespace/name" for exact match
exclusions:
  namespaces: []        # e.g. ["kube-system", "cert-manager"]
  deployments: []       # e.g. ["my-deploy", "monitoring/grafana"]
  statefulsets: []      # e.g. ["elastic-system/elasticsearch"]
  daemonsets: []        # e.g. ["kube-system/kube-proxy"]
  pods: []              # e.g. ["monitoring/fluent-bit-abc"]

# Elasticsearch (external prerequisite)
elasticsearch:
  url: ""
  username: ""
  password: ""
  secretRef: ""
  verifyTls: true
  indices:
    # Index where kube-seer stores collected metrics
    metrics: "sre-metrics"
    # Index where kube-seer stores detected anomalies
    anomalies: "sre-anomalies"
    # Set to match your existing log shipper index name or pattern (e.g. "my-logs-*")
    logs: "sre-logs"
    insights: "sre-insights"

# Collectors
collectors:
  prometheus:
    enabled: true
    url: "http://prometheus-server:9090"
  metricsServer:
    enabled: true
  kubernetesApi:
    enabled: true
    watchEvents: true

# Detection thresholds
thresholds:
  cpu:
    warning: 70
    critical: 85
  memory:
    warning: 70
    critical: 85
  disk:
    warning: 80
    critical: 90

# ML
ml:
  retrainInterval: 3600
  windowSize: 100
  anomalyThreshold: 0.05

# Intelligence (optional LLM analysis)
# Produces root cause analysis and recommendations at the end of each cycle.
# Supports Ollama (self-hosted, data stays on-cluster), OpenAI, and Anthropic.
intelligence:
  enabled: false
  # "ollama" | "openai" | "anthropic"
  provider: ""
  # Ollama: http://ollama.monitoring.svc:11434
  # OpenAI: leave empty (uses https://api.openai.com)
  # Anthropic: leave empty (uses SDK default)
  apiUrl: ""
  apiKey: ""
  apiKeySecretRef: ""
  model: ""
  # LLM request timeout in seconds (if needed).
  timeoutSeconds: 60

# Alerting
alerter:
  alertmanager:
    enabled: true
    url: "http://alertmanager:9093"
  fallback:
    webhook:
      enabled: false
      url: ""
  # Slack notifications via AlertmanagerConfig (requires Prometheus Operator)
  slack:
    enabled: false
    # Webhook URL — use webhookUrlSecretRef in production
    webhookUrl: ""
    # Reference to an existing Secret: { name: my-secret, key: webhookUrl }
    webhookUrlSecretRef: {}
    channel: "#alerts"
    sendResolved: true

# Image
image:
  repository: damsdgn29/kube-seer
  tag: "2.0.0"
  pullPolicy: IfNotPresent

# Resources
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

# Service
service:
  type: ClusterIP
  port: 8080
  nodePort: ""

# ServiceMonitor
serviceMonitor:
  enabled: false
  interval: 30s

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Security
securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
